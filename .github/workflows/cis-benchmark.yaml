name: cis-benchmark

on:
  workflow_call:
    inputs:
      eks-cluster-name:
        required: true
        type: string
      aws-region:
        required: false
        type: string
        default: us-east-1
    secrets:
      aws-role-to-assume:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  cis-scan:
    name: Run kube-bench
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.aws-role-to-assume }}
          aws-region: ${{ inputs.aws-region }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name "${{ inputs.eks-cluster-name }}" \
            --region "${{ inputs.aws-region }}"

      - name: Verify cluster access
        run: |
          kubectl version --client
          kubectl get nodes

      - name: Run kube-bench in container
        run: |
          docker run --rm \
            --network host \
            -v "$HOME/.kube:/root/.kube:ro" \
            aquasec/kube-bench:latest \
            run --json > kube-bench.json 2> kube-bench.stderr || true

      - name: Upload kube-bench outputs
        uses: actions/upload-artifact@v4
        with:
          name: kube-bench
          path: |
            kube-bench.json
            kube-bench.stderr
          if-no-files-found: ignore

  cis-benchmark-summary:
    name: CIS benchmark summary & findings
    runs-on: ubuntu-latest
    needs: cis-scan

    steps:
      - name: Download kube-bench artifact
        uses: actions/download-artifact@v4
        with:
          name: kube-bench
          path: .

      - name: Build CIS summary and findings
        shell: bash
        run: |
          echo "## CIS Benchmark Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ ! -s kube-bench.json ]; then
            echo "- kube-bench.json is missing or empty." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### kube-bench stderr" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,200p' kube-bench.stderr >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if ! jq empty kube-bench.json >/dev/null 2>&1; then
            echo "- kube-bench.json is not valid JSON." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### kube-bench.json (first 200 lines)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,200p' kube-bench.json >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### kube-bench stderr (first 200 lines)" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            sed -n '1,200p' kube-bench.stderr >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          TOTAL=$(jq '[.. | objects | select(has("status"))] | length' kube-bench.json)
          PASS=$(jq '[.. | objects | select(.status=="PASS")] | length' kube-bench.json)
          FAIL=$(jq '[.. | objects | select(.status=="FAIL")] | length' kube-bench.json)
          WARN=$(jq '[.. | objects | select(.status=="WARN")] | length' kube-bench.json)
          INFO=$(jq '[.. | objects | select(.status=="INFO")] | length' kube-bench.json)

          echo "- Artifact: \`kube-bench.json\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Total checks: ${TOTAL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- PASS: ${PASS}" >> "$GITHUB_STEP_SUMMARY"
          echo "- FAIL: ${FAIL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- WARN: ${WARN}" >> "$GITHUB_STEP_SUMMARY"
          echo "- INFO: ${INFO}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          echo "### Failed Findings" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          jq -r '
            [
              .. | objects
              | select(.status=="FAIL")
              | {
                  test_number: (.test_number // .test_id // "N/A"),
                  test_desc: (.test_desc // .test_name // "No description"),
                  section: (.section // .group_title // .test_group // "N/A"),
                  node: (.node_name // .node // .target // "N/A"),
                  remediation: (.remediation // "N/A")
                }
            ] as $items
            | if ($items | length) == 0 then
                "No failed findings."
              else
                $items[]
                | "- [" + .test_number + "] " + .test_desc
                  + " | Section: " + .section
                  + " | Node: " + .node
                  + " | Remediation: " + .remediation
              end
          ' kube-bench.json >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Warning Findings" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          jq -r '
            [
              .. | objects
              | select(.status=="WARN")
              | {
                  test_number: (.test_number // .test_id // "N/A"),
                  test_desc: (.test_desc // .test_name // "No description"),
                  section: (.section // .group_title // .test_group // "N/A"),
                  node: (.node_name // .node // .target // "N/A"),
                  remediation: (.remediation // "N/A")
                }
            ] as $items
            | if ($items | length) == 0 then
                "No warning findings."
              else
                $items[]
                | "- [" + .test_number + "] " + .test_desc
                  + " | Section: " + .section
                  + " | Node: " + .node
                  + " | Remediation: " + .remediation
              end
          ' kube-bench.json >> "$GITHUB_STEP_SUMMARY"
name: helm-chart-scan

on:
  workflow_call:
    inputs:
      chart-path:
        required: false
        type: string
        default: helm/simple-game
      values-file:
        required: false
        type: string
        default: helm/simple-game/values.yaml

permissions:
  contents: read
  security-events: write

jobs:
  helm-chart-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: |
          helm lint "${{ inputs.chart-path }}" -f "${{ inputs.values-file }}"

      - name: Render Helm manifests
        run: |
          helm template simple-game "${{ inputs.chart-path }}" -f "${{ inputs.values-file }}" > rendered.yaml

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Scan rendered manifests
        run: |
          trivy config rendered.yaml \
            --format sarif \
            --output trivy-k8s.sarif

      - name: Upload rendered manifest SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-k8s.sarif

      - name: Deep RBAC risk check
        id: rbac_check
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import sys
          import yaml

          risky_findings = []

          def add_finding(kind, name, msg):
              risky_findings.append(f"{kind}/{name}: {msg}")

          with open("rendered.yaml", "r", encoding="utf-8") as f:
              docs = list(yaml.safe_load_all(f))

          bindings = []

          for doc in docs:
              if not isinstance(doc, dict):
                  continue

              kind = doc.get("kind")
              meta = doc.get("metadata", {}) or {}
              name = meta.get("name", "unknown")
              namespace = meta.get("namespace", "default")

              if kind in ("Role", "ClusterRole"):
                  rules = doc.get("rules", []) or []

                  for rule in rules:
                      api_groups = rule.get("apiGroups", []) or []
                      resources = rule.get("resources", []) or []
                      verbs = rule.get("verbs", []) or []

                      if "*" in api_groups or "*" in resources or "*" in verbs:
                          add_finding(kind, name, "wildcard apiGroups/resources/verbs detected")

                      if "secrets" in resources and any(v in verbs for v in ["get", "list", "watch", "*"]):
                          add_finding(kind, name, "can read Kubernetes secrets")

                      if "pods/exec" in resources and any(v in verbs for v in ["create", "*"]):
                          add_finding(kind, name, "can exec into pods")

                      if "pods/attach" in resources and any(v in verbs for v in ["create", "*"]):
                          add_finding(kind, name, "can attach to pods")

                      if "pods/portforward" in resources and any(v in verbs for v in ["create", "*"]):
                          add_finding(kind, name, "can port-forward to pods")

                      if "impersonate" in verbs:
                          add_finding(kind, name, "can impersonate users/groups/serviceaccounts")

                      if "rbac.authorization.k8s.io" in api_groups:
                          if any(r in resources for r in ["roles", "clusterroles", "rolebindings", "clusterrolebindings"]):
                              if any(v in verbs for v in ["create", "update", "patch", "bind", "escalate", "*"]):
                                  add_finding(kind, name, "can modify or escalate RBAC permissions")

                      risky_workloads = {
                          "pods", "deployments", "daemonsets", "statefulsets", "jobs", "cronjobs"
                      }
                      if any(r in resources for r in risky_workloads) and any(v in verbs for v in ["create", "update", "patch", "*"]):
                          add_finding(kind, name, "can create or modify workloads")

                      if "serviceaccounts" in resources and any(v in verbs for v in ["create", "update", "patch", "impersonate", "*"]):
                          add_finding(kind, name, "can modify or impersonate service accounts")

                      if "admissionregistration.k8s.io" in api_groups and any(v in verbs for v in ["create", "update", "patch", "delete", "*"]):
                          add_finding(kind, name, "can modify admission webhooks")

                      if "nodes/proxy" in resources and any(v in verbs for v in ["get", "create", "*"]):
                          add_finding(kind, name, "can access node proxy")

                      if "nodes" in resources and any(v in verbs for v in ["proxy", "*"]):
                          add_finding(kind, name, "can proxy to nodes")

                      if "authentication.k8s.io" in api_groups and "tokenreviews" in resources and any(v in verbs for v in ["create", "*"]):
                          add_finding(kind, name, "can create token reviews")

                      if "authorization.k8s.io" in api_groups and any(r in resources for r in ["subjectaccessreviews", "selfsubjectaccessreviews", "localsubjectaccessreviews"]) and any(v in verbs for v in ["create", "*"]):
                          add_finding(kind, name, "can create subject access reviews")

              elif kind in ("RoleBinding", "ClusterRoleBinding"):
                  bindings.append(doc)

          for binding in bindings:
              kind = binding.get("kind")
              meta = binding.get("metadata", {}) or {}
              name = meta.get("name", "unknown")
              namespace = meta.get("namespace", "default")
              role_ref = binding.get("roleRef", {}) or {}
              role_name = role_ref.get("name", "")
              subjects = binding.get("subjects", []) or []

              if role_name == "cluster-admin":
                  add_finding(kind, name, "binds cluster-admin")

              for subject in subjects:
                  s_kind = subject.get("kind", "")
                  s_name = subject.get("name", "")
                  s_ns = subject.get("namespace", namespace)

                  if s_kind == "Group" and s_name in [
                      "system:authenticated",
                      "system:unauthenticated",
                      "system:serviceaccounts",
                  ]:
                      add_finding(kind, name, f"binds privileged role to broad group {s_name}")

                  if s_kind == "ServiceAccount" and s_name == "default":
                      add_finding(kind, name, f"binds role to default service account in namespace {s_ns}")

          with open("rbac-findings.txt", "w", encoding="utf-8") as out:
              if risky_findings:
                  for finding in risky_findings:
                      out.write(f"- {finding}\n")

          if risky_findings:
              print("Deep RBAC risk findings detected:\n")
              for finding in risky_findings:
                  print(f"- {finding}")
              sys.exit(1)

          print("No deep RBAC risks detected.")
          PY

      - name: Upload RBAC findings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rbac-findings
          path: rbac-findings.txt
          if-no-files-found: ignore

      - name: Add Helm chart scan summary
        if: always()
        shell: bash
        run: |
          echo "## Helm Chart Scan Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Chart path: \`${{ inputs.chart-path }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Values file: \`${{ inputs.values-file }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Helm lint: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Manifest render: completed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Trivy manifest scan: completed" >> "$GITHUB_STEP_SUMMARY"

          if [ -f rbac-findings.txt ] && [ -s rbac-findings.txt ]; then
            echo "- Deep RBAC risk check: **FAILED**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### RBAC Findings" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat rbac-findings.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Deep RBAC risk check: **PASSED**" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail workflow if RBAC risk findings exist
        if: steps.rbac_check.outcome == 'failure'
        run: |
          echo "Deep RBAC risk findings detected"
          exit 1
name: image-signing

on:
  workflow_call:
    inputs:
      image-ref:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  container-image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Verify image is reachable
        run: docker buildx imagetools inspect "${{ inputs.image-ref }}"

      - name: Generate Trivy SARIF report
        run: |
          trivy image \
            --format sarif \
            --output trivy-image-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ inputs.image-ref }}"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      - name: Generate Trivy JSON report
        run: |
          trivy image \
            --format json \
            --output trivy-image-results.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ inputs.image-ref }}"

      - name: Add Trivy image summary
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from collections import Counter

          with open("trivy-image-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          vulns = []
          for result in data.get("Results", []):
              target = result.get("Target", "")
              for v in result.get("Vulnerabilities", []) or []:
                  vulns.append({
                      "target": target,
                      "id": v.get("VulnerabilityID", "N/A"),
                      "severity": v.get("Severity", "UNKNOWN"),
                      "pkg": v.get("PkgName", "N/A"),
                      "installed": v.get("InstalledVersion", "N/A"),
                      "fixed": v.get("FixedVersion") or "N/A",
                  })

          counts = Counter(v["severity"] for v in vulns)

          with open("image-summary.md", "w", encoding="utf-8") as out:
              out.write("## Trivy Image Scan Summary\n\n")
              out.write(f"- **Image:** `{data.get('ArtifactName', 'N/A')}`\n")
              out.write(f"- **Total findings:** **{len(vulns)}**\n")
              out.write(f"- **Critical:** {counts.get('CRITICAL', 0)}\n")
              out.write(f"- **High:** {counts.get('HIGH', 0)}\n\n")

              if vulns:
                  out.write("| CVE ID | Severity | Package | Installed | Fixed | Target |\n")
                  out.write("|---|---|---|---|---|---|\n")
                  for v in vulns[:50]:
                      out.write(f"| {v['id']} | {v['severity']} | `{v['pkg']}` | `{v['installed']}` | `{v['fixed']}` | `{v['target']}` |\n")
              else:
                  out.write("No HIGH/CRITICAL vulnerabilities found in the container image.\n")

          PY

          cat image-summary.md >> "$GITHUB_STEP_SUMMARY"

      # - name: Fail on HIGH/CRITICAL vulnerabilities
      #   run: |
      #     trivy image \
      #       --severity HIGH,CRITICAL \
      #       --ignore-unfixed \
      #       --exit-code 1 \
      #       "${{ inputs.image-ref }}"

  container-image-signing:
    runs-on: ubuntu-latest
    needs: container-image-scan

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${{ inputs.image-ref }}"

      - name: Verify image signature and identity
        id: cosign_verify
        shell: bash
        run: |
          set +e

          EXPECTED_IDENTITY="https://github.com/security-org-230982/security-engineering/.github/workflows/image-signing.yaml@refs/heads/main"
          ISSUER="https://token.actions.githubusercontent.com"

          VERIFY_OUTPUT=$(cosign verify \
            --certificate-identity "$EXPECTED_IDENTITY" \
            --certificate-oidc-issuer "$ISSUER" \
            "${{ inputs.image-ref }}" 2>&1)

          STATUS=$?

          echo "COSIGN_OUTPUT<<EOF" >> $GITHUB_OUTPUT
          echo "$VERIFY_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          echo "EXPECTED_IDENTITY=$EXPECTED_IDENTITY" >> $GITHUB_OUTPUT
          echo "ISSUER=$ISSUER" >> $GITHUB_OUTPUT

          if [ $STATUS -eq 0 ]; then
            echo "COSIGN_STATUS=PASS" >> $GITHUB_OUTPUT
          else
            echo "COSIGN_STATUS=FAIL" >> $GITHUB_OUTPUT
          fi

          exit 0

      - name: Add Cosign summary
        shell: bash
        run: |
          echo "## Cosign Image Signing & Verification" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ inputs.image-ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verification Status: **${{ steps.cosign_verify.outputs.COSIGN_STATUS }}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Expected Identity" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.cosign_verify.outputs.EXPECTED_IDENTITY }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### OIDC Issuer" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.cosign_verify.outputs.ISSUER }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Verification Details" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.cosign_verify.outputs.COSIGN_OUTPUT }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if verification failed
        if: steps.cosign_verify.outputs.COSIGN_STATUS == 'FAIL'
        run: |
          echo "Cosign verification failed: identity mismatch or signature invalid"
          exit 1
name: image-signing-verification

on:
  workflow_call:
    inputs:
      image-ref:
        required: true
        type: string
      certificate-identity:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  packages: read
  security-events: write
  id-token: write

jobs:
  container-image-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Verify image signature
        shell: bash
        run: |
          if [ -n "${{ inputs.certificate-identity }}" ]; then
            cosign verify \
              --certificate-identity "${{ inputs.certificate-identity }}" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${{ inputs.image-ref }}"
          else
            cosign verify \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              "${{ inputs.image-ref }}"
          fi
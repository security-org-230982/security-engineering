name: sca-scan

on:
  workflow_call:

permissions:
  contents: read
  security-events: write

jobs:
  sca-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Run Trivy filesystem scan for dependencies (SARIF)
        run: |
          trivy fs \
            --format sarif \
            --output trivy-sca-results.sarif \
            --severity MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            .

      - name: Upload Trivy SCA SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-sca-results.sarif

      - name: Generate Trivy SCA JSON report
        run: |
          trivy fs \
            --format json \
            --output trivy-sca-results.json \
            --severity MEDIUM,HIGH,CRITICAL \
            --ignore-unfixed \
            .

      - name: Add SCA summary
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from collections import Counter

          with open("trivy-sca-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          vulns = []
          for result in data.get("Results", []):
              target = result.get("Target", "")
              for v in result.get("Vulnerabilities", []) or []:
                  vulns.append({
                      "target": target,
                      "id": v.get("VulnerabilityID", "N/A"),
                      "severity": v.get("Severity", "UNKNOWN"),
                      "pkg": v.get("PkgName", "N/A"),
                      "installed": v.get("InstalledVersion", "N/A"),
                      "fixed": v.get("FixedVersion") or "N/A",
                      "title": (v.get("Title") or v.get("Description") or "").replace("\n", " ").strip()
                  })

          counts = Counter(v["severity"] for v in vulns)

          with open("sca-summary.md", "w", encoding="utf-8") as out:
              out.write("## SCA Scan Summary\n\n")
              out.write(f"- **Total findings:** **{len(vulns)}**\n")
              out.write(f"- **Critical:** {counts.get('CRITICAL', 0)}\n")
              out.write(f"- **High:** {counts.get('HIGH', 0)}\n")
              out.write(f"- **Medium:** {counts.get('MEDIUM', 0)}\n\n")

              if vulns:
                  out.write("| CVE ID | Severity | Package | Installed | Fixed | Target |\n")
                  out.write("|---|---|---|---|---|---|\n")
                  for v in vulns[:50]:
                      out.write(f"| {v['id']} | {v['severity']} | `{v['pkg']}` | `{v['installed']}` | `{v['fixed']}` | `{v['target']}` |\n")

                  if len(vulns) > 50:
                      out.write(f"\n_Only first 50 findings shown. Total findings: {len(vulns)}._\n")

                  out.write("\n<details><summary>Detailed SCA findings</summary>\n\n")
                  for i, v in enumerate(vulns[:100], start=1):
                      out.write(f"### {i}. {v['id']} ({v['severity']})\n")
                      out.write(f"- Package: `{v['pkg']}`\n")
                      out.write(f"- Installed: `{v['installed']}`\n")
                      out.write(f"- Fixed: `{v['fixed']}`\n")
                      out.write(f"- Target: `{v['target']}`\n")
                      if v["title"]:
                          out.write(f"- Detail: {v['title']}\n")
                      out.write("\n")
                  out.write("</details>\n")
              else:
                  out.write("No MEDIUM/HIGH/CRITICAL dependency findings detected.\n")

          PY

          cat sca-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail on HIGH/CRITICAL dependency vulnerabilities
        run: |
          trivy fs \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            .
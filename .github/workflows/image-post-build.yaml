name: image-post-build

on:
  workflow_call:
    inputs:
      image-ref:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.2

      - name: Generate Trivy SARIF report
        run: |
          trivy image \
            --format sarif \
            --output trivy-image-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ inputs.image-ref }}"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      - name: Generate Trivy JSON report
        run: |
          trivy image \
            --format json \
            --output trivy-image-results.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            "${{ inputs.image-ref }}"

      - name: Add Trivy summary
        shell: bash
        run: |
          python3 <<'PY'
          import json
          from collections import Counter

          with open("trivy-image-results.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          vulns = []
          for result in data.get("Results", []):
              target = result.get("Target", "")
              for v in result.get("Vulnerabilities", []) or []:
                  vulns.append({
                      "target": target,
                      "id": v.get("VulnerabilityID", "N/A"),
                      "severity": v.get("Severity", "UNKNOWN"),
                      "pkg": v.get("PkgName", "N/A"),
                      "installed": v.get("InstalledVersion", "N/A"),
                      "fixed": v.get("FixedVersion") or "N/A",
                  })

          counts = Counter(v["severity"] for v in vulns)

          with open("trivy-summary.md", "w", encoding="utf-8") as out:
              out.write("## Trivy Image Scan Summary\n\n")
              out.write(f"- **Total findings:** **{len(vulns)}**\n")
              out.write(f"- **Critical:** {counts.get('CRITICAL', 0)}\n")
              out.write(f"- **High:** {counts.get('HIGH', 0)}\n\n")

              if vulns:
                  out.write("| CVE ID | Severity | Package | Installed | Fixed |\n")
                  out.write("|---|---|---|---|---|\n")
                  for v in vulns[:50]:
                      out.write(f"| {v['id']} | {v['severity']} | `{v['pkg']}` | `{v['installed']}` | `{v['fixed']}` |\n")
              else:
                  out.write("No HIGH/CRITICAL vulnerabilities found.\n")

          PY

          cat trivy-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce Trivy policy
        run: |
          trivy image \
            --format table \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "${{ inputs.image-ref }}"

  cosign-sign:
    runs-on: ubuntu-latest
    needs: trivy-image
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${{ inputs.image-ref }}"
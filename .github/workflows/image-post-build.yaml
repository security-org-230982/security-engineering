name: image-post-build

on:
  workflow_call:
    inputs:
      image-ref:
        required: true
        type: string

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

jobs:
  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Show image reference
        run: echo "${{ inputs.image-ref }}"

      - name: Verify image is reachable
        run: docker buildx imagetools inspect "${{ inputs.image-ref }}"

      - name: Run Trivy image scan for SARIF
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: ${{ inputs.image-ref }}
          format: sarif
          output: trivy-image-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Check SARIF file
        run: test -f trivy-image-results.sarif

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image-results.sarif

      # - name: Enforce Trivy policy
      #   uses: aquasecurity/trivy-action@master
      #   with:
      #     scan-type: image
      #     image-ref: ${{ inputs.image-ref }}
      #     format: table
      #     severity: HIGH,CRITICAL
      #     ignore-unfixed: true
      #     exit-code: 1

  cosign-sign:
    runs-on: ubuntu-latest
    needs: trivy-image
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: cosign sign --yes "${{ inputs.image-ref }}"
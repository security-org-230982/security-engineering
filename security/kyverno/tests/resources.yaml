apiVersion: v1
kind: Pod
metadata:
  name: bad-latest-tag
spec:
  containers:
    - name: app
      image: ghcr.io/security-org-230982/simple-game:latest
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
  securityContext:
    fsGroup: 10001
---
apiVersion: v1
kind: Pod
metadata:
  name: good-pinned-tag
spec:
  containers:
    - name: app
      image: ghcr.io/security-org-230982/simple-game:1.0.0
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
  securityContext:
    fsGroup: 10001
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-privileged-pod
spec:
  containers:
    - name: app
      image: ghcr.io/security-org-230982/simple-game:1.0.0
      securityContext:
        privileged: true
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
  securityContext:
    fsGroup: 10001
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-missing-security-context
spec:
  containers:
    - name: app
      image: ghcr.io/security-org-230982/simple-game:1.0.0
---
apiVersion: v1
kind: Pod
metadata:
  name: bad-hostpath-pod
spec:
  containers:
    - name: app
      image: ghcr.io/security-org-230982/simple-game:1.0.0
      volumeMounts:
        - name: host-volume
          mountPath: /host
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
  securityContext:
    fsGroup: 10001
  volumes:
    - name: host-volume
      hostPath:
        path: /var/run/docker.sock
---
apiVersion: v1
kind: Pod
metadata:
  name: good-secure-pod
spec:
  containers:
    - name: app
      image: ghcr.io/security-org-230982/simple-game:1.0.0
      securityContext:
        runAsNonRoot: true
        readOnlyRootFilesystem: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
  securityContext:
    fsGroup: 10001
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: bad-wildcard-clusterrole
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bad-cluster-admin-binding
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: good-readonly-role
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]